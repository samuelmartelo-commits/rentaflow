<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RentaFlow — Gestión de arriendos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.30.0/tabler-icons.min.css">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #F5F5F2;
      -webkit-font-smoothing: antialiased;
    }
    select, input, textarea, button { font-family: inherit; }
    input[type=text], input[type=email], input[type=number], input[type=password] {
      outline: none;
    }
    input[type=text]:focus, input[type=email]:focus, select:focus {
      border-color: #185FA5 !important;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D0D0C8; border-radius: 10px; }

    /* CSS variables para que los componentes funcionen */
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #F8F8F6;
      --color-background-tertiary: #F5F5F2;
      --color-text-primary: #1a1a1a;
      --color-text-secondary: #666666;
      --color-text-tertiary: #aaaaaa;
      --color-border-primary: #C0C0B8;
      --color-border-secondary: #D0D0C8;
      --color-border-tertiary: #E5E5E0;
      --border-radius-sm: 6px;
      --border-radius-md: 8px;
      --border-radius-lg: 12px;
      --font-sans: 'Inter', system-ui, sans-serif;
      --font-mono: 'SFMono-Regular', Consolas, monospace;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    // ─── TOKENS ──────────────────────────────────────────────────────────────
    const COLORS = {
      blue:   { bg:"#E6F1FB", text:"#0C447C", mid:"#185FA5" },
      green:  { bg:"#EAF3DE", text:"#27500A", mid:"#3B6D11" },
      amber:  { bg:"#FAEEDA", text:"#633806", mid:"#854F0B" },
      red:    { bg:"#FCEBEB", text:"#791F1F", mid:"#A32D2D" },
      purple: { bg:"#EEEDFE", text:"#3C3489", mid:"#534AB7" },
      teal:   { bg:"#E1F5EE", text:"#085041", mid:"#0F6E56" },
      gray:   { bg:"#F1EFE8", text:"#444441", mid:"#5F5E5A" },
    };

    // ─── UI ATOMS ────────────────────────────────────────────────────────────
    const Pill = ({ color="gray", children }) => (
      React.createElement('span', { style: { fontSize:11, padding:"2px 8px", borderRadius:20, fontWeight:500, background:COLORS[color]?.bg||"#F1EFE8", color:COLORS[color]?.text||"#444", whiteSpace:"nowrap" }}, children)
    );

    const Avatar = ({ initials, color="blue" }) => (
      React.createElement('div', { style: { width:28, height:28, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:500, flexShrink:0, background:COLORS[color]?.bg, color:COLORS[color]?.text }}, initials)
    );

    const MetricCard = ({ label, value, sub, subColor }) => (
      React.createElement('div', { style:{ background:"#F8F8F6", borderRadius:8, padding:"12px 14px" }},
        React.createElement('div', { style:{ fontSize:11, color:"#888", marginBottom:4 }}, label),
        React.createElement('div', { style:{ fontSize:20, fontWeight:500 }}, value),
        sub && React.createElement('div', { style:{ fontSize:11, color:subColor||"#888", marginTop:2 }}, sub)
      )
    );

    const Card = ({ title, action, onAction, children, style={} }) => (
      React.createElement('div', { style:{ background:"#fff", border:"0.5px solid #E5E5E0", borderRadius:12, padding:14, ...style }},
        title && React.createElement('div', { style:{ fontSize:13, fontWeight:500, marginBottom:12, display:"flex", justifyContent:"space-between", alignItems:"center" }},
          title,
          action && React.createElement('span', { style:{ fontSize:11, color:"#888", cursor:"pointer" }, onClick:onAction }, action)
        ),
        children
      )
    );

    const AlertRow = ({ icon, iconBg, iconColor, title, sub }) => (
      React.createElement('div', { style:{ display:"flex", alignItems:"flex-start", gap:9, padding:"8px 0", borderBottom:"0.5px solid #EBEBEB" }},
        React.createElement('div', { style:{ width:26, height:26, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", background:iconBg, flexShrink:0, fontSize:14, color:iconColor }}, icon),
        React.createElement('div', null,
          React.createElement('div', { style:{ fontWeight:500, fontSize:12.5 }}, title),
          React.createElement('div', { style:{ fontSize:11, color:"#888", marginTop:1 }}, sub)
        )
      )
    );

    const ListRow = ({ left, right }) => (
      React.createElement('div', { style:{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"7px 0", borderBottom:"0.5px solid #EBEBEB", fontSize:12.5 }},
        left, right
      )
    );

    const Btn = ({ primary, children, onClick, style={} }) => (
      React.createElement('button', { onClick, style:{ padding:"6px 12px", border:primary?"none":"0.5px solid #D0D0C8", borderRadius:8, fontSize:12.5, cursor:"pointer", display:"inline-flex", alignItems:"center", gap:5, fontWeight:primary?500:400, background:primary?"#185FA5":"#fff", color:primary?"#fff":"#333", ...style }}, children)
    );

    const FTab = ({ label, active, onClick, color }) => (
      React.createElement('button', { onClick, style:{ padding:"3px 10px", borderRadius:20, fontSize:11.5, cursor:"pointer", border:`0.5px solid ${active&&color?COLORS[color]?.mid:"#D0D0C8"}`, background:active?(color?COLORS[color]?.bg:"#1a1a1a"):"#fff", color:active?(color?COLORS[color]?.text:"#fff"):"#666", fontWeight:active?500:400 }}, label)
    );

    const fmt = n => "$" + Number(n).toLocaleString("es-CO");

    // ─── PÁGINAS ──────────────────────────────────────────────────────────────

    function Dashboard({ setPage }) {
      const DATA = [
        { m:"Ene", ing:31200000, gas:7100000 },
        { m:"Feb", ing:33400000, gas:6800000 },
        { m:"Mar", ing:32800000, gas:8200000 },
        { m:"Abr", ing:35100000, gas:7400000 },
        { m:"May", ing:36800000, gas:6900000 },
        { m:"Jun", ing:38400000, gas:8400000 },
      ];
      const [mes, setMes] = useState("Todos");
      const filtData = mes === "Todos" ? DATA : DATA.filter(d => d.m === mes);
      const maxV = Math.max(...filtData.map(d => d.ing));
      const bH = 100;
      const gapW = Math.floor(480 / Math.max(filtData.length, 1));
      const bW = Math.min(22, gapW - 8);
      const totalI = filtData.reduce((s,d) => s+d.ing, 0);
      const totalG = filtData.reduce((s,d) => s+d.gas, 0);

      return React.createElement('div', null,
        // Métricas
        React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, marginBottom:14 }},
          React.createElement(MetricCard, { label:"Inmuebles", value:"27", sub:"23 ocupados · 4 libres" }),
          React.createElement(MetricCard, { label:"Recaudo junio", value:"$38.4M", sub:"↑ +4.2% vs mayo", subColor:"#27500A" }),
          React.createElement(MetricCard, { label:"Cartera vencida", value:"$4.1M", sub:"5 en mora", subColor:"#A32D2D" }),
          React.createElement(MetricCard, { label:"Ocupación", value:"85.2%", sub:"Meta: 90%", subColor:"#27500A" })
        ),
        // Alertas + Pagos
        React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:12 }},
          React.createElement(Card, { title:"Alertas prioritarias" },
            React.createElement(AlertRow, { icon:"⏰", iconBg:"#FCEBEB", iconColor:"#A32D2D", title:"Mora +30 días · 3 inquilinos", sub:"Local 204 · Apto 18 · Bodega B3" }),
            React.createElement(AlertRow, { icon:"📄", iconBg:"#FAEEDA", iconColor:"#854F0B", title:"Contratos por vencer", sub:"4 contratos vencen jun 20–30" }),
            React.createElement(AlertRow, { icon:"🔧", iconBg:"#E6F1FB", iconColor:"#185FA5", title:"Mantenimientos pendientes", sub:"2 solicitudes sin atender" }),
            React.createElement('div', { style:{ paddingTop:8, display:"flex", alignItems:"flex-start", gap:9 }},
              React.createElement('div', { style:{ width:26, height:26, borderRadius:6, display:"flex", alignItems:"center", justifyContent:"center", background:"#EAF3DE", flexShrink:0, fontSize:14 }}, "📈"),
              React.createElement('div', null,
                React.createElement('div', { style:{ fontWeight:500, fontSize:12.5 }}, "Incremento IPC pendiente"),
                React.createElement('div', { style:{ fontSize:11, color:"#888", marginTop:1 }}, "3 contratos por ajustar 4.2%")
              )
            )
          ),
          React.createElement(Card, { title:"Últimos pagos", action:"Ver todos →", onAction:() => setPage("pagos") },
            ...[
              { ini:"LM", col:"teal", name:"Laura Monsalve", sub:"Apto 12 · hoy", val:"$1.850.000", pill:"green", tag:"Pagado" },
              { ini:"RG", col:"purple", name:"Ricardo Gómez", sub:"Local 08 · ayer", val:"$3.200.000", pill:"green", tag:"Pagado" },
              { ini:"MP", col:"amber", name:"Martha Peña", sub:"Apto 05 · hace 2 días", val:"$1.450.000", pill:"amber", tag:"Parcial" },
              { ini:"JC", col:"red", name:"Jorge Castro", sub:"Bodega B3 · vencido", val:"$2.100.000", pill:"red", tag:"Mora" },
            ].map((p,i) => React.createElement(ListRow, { key:i,
              left: React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:7 }},
                React.createElement(Avatar, { initials:p.ini, color:p.col }),
                React.createElement('div', null,
                  React.createElement('div', null, p.name),
                  React.createElement('div', { style:{ fontSize:11, color:"#888" }}, p.sub)
                )
              ),
              right: React.createElement('div', { style:{ textAlign:"right" }},
                React.createElement('div', { style:{ fontWeight:500, marginBottom:2 }}, p.val),
                React.createElement(Pill, { color:p.pill }, p.tag)
              )
            }))
          )
        ),
        // Gráfica Ingresos vs Gastos
        React.createElement(Card, { title:"Ingresos vs Gastos 2025", style:{ marginBottom:12 }},
          React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }},
            React.createElement('span', { style:{ fontSize:11, color:"#888" }}, "Mes:"),
            ...[{ v:"Todos", l:"Todos" }, ...DATA.map(d => ({ v:d.m, l:d.m }))].map(o =>
              React.createElement(FTab, { key:o.v, label:o.l, active:mes===o.v, onClick:()=>setMes(o.v), color: mes===o.v?"blue":null })
            )
          ),
          React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:12 }},
            React.createElement('div', { style:{ background:"#E6F1FB", borderRadius:8, padding:"8px 12px", textAlign:"center" }},
              React.createElement('div', { style:{ fontSize:10, color:"#185FA5", textTransform:"uppercase" }}, "Ingresos"),
              React.createElement('div', { style:{ fontSize:16, fontWeight:500, color:"#0C447C" }}, "$"+(totalI/1000000).toFixed(1)+"M")
            ),
            React.createElement('div', { style:{ background:"#FCEBEB", borderRadius:8, padding:"8px 12px", textAlign:"center" }},
              React.createElement('div', { style:{ fontSize:10, color:"#A32D2D", textTransform:"uppercase" }}, "Gastos"),
              React.createElement('div', { style:{ fontSize:16, fontWeight:500, color:"#791F1F" }}, "$"+(totalG/1000000).toFixed(1)+"M")
            ),
            React.createElement('div', { style:{ background:"#EAF3DE", borderRadius:8, padding:"8px 12px", textAlign:"center" }},
              React.createElement('div', { style:{ fontSize:10, color:"#3B6D11", textTransform:"uppercase" }}, "Balance libre"),
              React.createElement('div', { style:{ fontSize:16, fontWeight:500, color:"#27500A" }}, "$"+((totalI-totalG)/1000000).toFixed(1)+"M")
            )
          ),
          React.createElement('svg', { width:"100%", height:bH+28, viewBox:`0 0 500 ${bH+28}` },
            ...filtData.map((d,i) => {
              const hi = Math.round((d.ing/maxV)*bH);
              const hg = Math.round((d.gas/maxV)*bH);
              const x = 10 + i*gapW;
              return React.createElement('g', { key:i },
                React.createElement('rect', { x, y:bH-hi, width:bW, height:hi, rx:2, fill:"#185FA5", opacity:0.85 }),
                React.createElement('rect', { x:x+bW+3, y:bH-hg, width:bW, height:hg, rx:2, fill:"#E24B4A", opacity:0.75 }),
                React.createElement('text', { x:x+bW, y:bH+16, fontSize:9, fill:"#aaa", textAnchor:"middle" }, d.m)
              );
            }),
            React.createElement('line', { x1:0, y1:bH, x2:500, y2:bH, stroke:"#F0F0EC", strokeWidth:0.5 })
          )
        ),
        // Disponibilidad
        React.createElement(Card, { title:"Disponibilidad", action:"Ver todos →", onAction:()=>setPage("inmuebles") },
          React.createElement('div', { style:{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8 }},
            ...[
              { tipo:"Comercial", nombre:"Local 11-A", loc:"Centro · 48m²", color:"green", tag:"Libre" },
              { tipo:"Vivienda", nombre:"Apto 23", loc:"Cabecera · 65m²", color:"green", tag:"Libre" },
              { tipo:"Bodega", nombre:"Bod. C1", loc:"Industrial · 120m²", color:"amber", tag:"Reparación" },
              { tipo:"Vivienda", nombre:"Apto 31", loc:"Sotomayor · 70m²", color:"green", tag:"Libre" },
            ].map((d,i) => React.createElement('div', { key:i, style:{ padding:9, border:"0.5px solid #EBEBEB", borderRadius:8 }},
              React.createElement('div', { style:{ fontSize:10, color:"#aaa", textTransform:"uppercase", letterSpacing:".05em" }}, d.tipo),
              React.createElement('div', { style:{ fontWeight:500, fontSize:12.5, margin:"3px 0" }}, d.nombre),
              React.createElement('div', { style:{ fontSize:11, color:"#888" }}, d.loc),
              React.createElement('div', { style:{ marginTop:5 }}, React.createElement(Pill, { color:d.color }, d.tag))
            ))
          )
        )
      );
    }

    function Inmuebles() {
      const [active, setActive] = useState("Todos");
      const [ocupFiltro, setOcupFiltro] = useState("Todos");
      const tabs = ["Todos","Vivienda","Comercial","Bodega"];
      const all = [
        { tipo:"Vivienda", ref:"APT-03", nombre:"Apartamento 03", direccion:"Urb. La Victoria · Piso 1", area:65, inquilino:"Sandra Pulido", canon:1850000, vence:"Dic 2025", ocupacion:"Ocupado", contrato:"Vigente" },
        { tipo:"Comercial", ref:"LOC-08", nombre:"Local 08", direccion:"C.C. Cabecera · Piso 1", area:38, inquilino:"Ricardo Gómez", canon:3200000, vence:"Mar 2026", ocupacion:"Ocupado", contrato:"Vigente" },
        { tipo:"Vivienda", ref:"APT-12", nombre:"Apartamento 12", direccion:"Conj. Mirador Norte · Piso 3", area:58, inquilino:"Laura Monsalve", canon:1450000, vence:"Dic 2025", ocupacion:"Ocupado", contrato:"Por vencer" },
        { tipo:"Bodega", ref:"BOD-B3", nombre:"Bodega B3", direccion:"Zona Industrial · —", area:180, inquilino:"Jorge Castro", canon:2100000, vence:"Ago 2025", ocupacion:"Mora", contrato:"Vencido" },
        { tipo:"Vivienda", ref:"APT-23", nombre:"Apartamento 23", direccion:"Cabecera del Llano · Piso 5", area:70, inquilino:"—", canon:1900000, vence:"—", ocupacion:"Disponible", contrato:"Sin contrato" },
        { tipo:"Comercial", ref:"OFI-204", nombre:"Oficina 204", direccion:"Edificio Cámara · Piso 2", area:52, inquilino:"Andrés Parra", canon:2500000, vence:"Jun 2025", ocupacion:"Ocupado", contrato:"Por vencer" },
        { tipo:"Vivienda", ref:"APT-07", nombre:"Apartamento 07", direccion:"El Prado · Piso 2", area:55, inquilino:"Camilo Roa", canon:1350000, vence:"Nov 2025", ocupacion:"Ocupado", contrato:"Vigente" },
        { tipo:"Comercial", ref:"LOC-15B", nombre:"Local 15-B", direccion:"Centro Histórico · Piso 1", area:42, inquilino:"Mariana Torres", canon:2800000, vence:"Jun 2026", ocupacion:"Ocupado", contrato:"Vigente" },
        { tipo:"Bodega", ref:"BOD-C1", nombre:"Bodega C1", direccion:"Zona Industrial Norte · —", area:120, inquilino:"—", canon:1600000, vence:"—", ocupacion:"Reparación", contrato:"Sin contrato" },
      ];
      const ocupColor = { Ocupado:"green", Disponible:"blue", Mora:"red", Reparación:"amber" };
      const contratoColor = { Vigente:"green", "Por vencer":"amber", Vencido:"red", "Sin contrato":"gray" };
      const tipoColor = { Vivienda:"teal", Comercial:"blue", Bodega:"amber" };
      const filtered = all.filter(p => (active==="Todos"||p.tipo===active) && (ocupFiltro==="Todos"||p.ocupacion===ocupFiltro));

      return React.createElement('div', null,
        React.createElement('div', { style:{ display:"flex", alignItems:"center", gap:8, marginBottom:10, flexWrap:"wrap" }},
          React.createElement('input', { placeholder:"Buscar...", style:{ width:180, padding:"6px 10px", border:"0.5px solid #D0D0C8", borderRadius:8, fontSize:12.5 }}),
          React.createElement('div', { style:{ width:"0.5px", height:20, background:"#E0E0D8" }}),
          React.createElement('span', { style:{ fontSize:11, color:"#aaa" }}, "Tipo:"),
          ...tabs.map(t => React.createElement(FTab, { key:t, label:t, active:active===t, onClick:()=>setActive(t) })),
          React.createElement('div', { style:{ width:"0.5px", height:20, background:"#E0E0D8" }}),
          React.createElement('span', { style:{ fontSize:11, color:"#aaa" }}, "Ocupación:"),
          ...["Todos","Ocupado","Disponible","Mora","Reparación"].map(o => React.createElement(FTab, { key:o, label:o, active:ocupFiltro===o, onClick:()=>setOcupFiltro(o), color:ocupColor[o] })),
          React.createElement('div', { style:{ marginLeft:"auto" }}, React.createElement(Btn, { primary:true }, "+ Nuevo"))
        ),
        React.createElement('div', { style:{ background:"#fff", border:"0.5px solid #E5E5E0", borderRadius:12, overflow:"hidden" }},
          React.createElement('div', { style:{ overflowX:"auto" }},
            React.createElement('table', { style:{ width:"100%", borderCollapse:"collapse", fontSize:12.5 }},
              React.createElement('thead', null,
                React.createElement('tr', { style:{ background:"#F8F8F6", borderBottom:"0.5px solid #E5E5E0" }},
                  ...["Ref.","Inmueble","Tipo","Dirección","m²","Inquilino","Canon/mes","Vence","Ocupación","Contrato"].map((h,i) =>
                    React.createElement('th', { key:i, style:{ textAlign:"left", padding:"7px 10px", fontSize:11, fontWeight:500, color:"#888", whiteSpace:"nowrap", borderRight:"0.5px solid #ECECEA" }}, h)
                  )
                )
              ),
              React.createElement('tbody', null,
                ...filtered.map((p,i) => React.createElement('tr', { key:i, style:{ borderBottom:"0.5px solid #F2F2F0", background:i%2===0?"#fff":"#FAFAF8" }},
                  React.createElement('td', { style:{ padding:"7px 10px", color:"#bbb", fontSize:10.5, fontFamily:"monospace", borderRight:"0.5px solid #F0F0EC" }}, p.ref),
                  React.createElement('td', { style:{ padding:"7px 10px", fontWeight:500, whiteSpace:"nowrap", borderRight:"0.5px solid #F0F0EC" }}, p.nombre),
                  React.createElement('td', { style:{ padding:"7px 10px", borderRight:"0.5px solid #F0F0EC" }}, React.createElement(Pill, { color:tipoColor[p.tipo] }, p.tipo)),
                  React.createElement('td', { style:{ padding:"7px 10px", color:"#666", whiteSpace:"nowrap", borderRight:"0.5px solid #F0F0EC" }}, p.direccion),
                  React.createElement('td', { style:{ padding:"7px 10px", textAlign:"right", borderRight:"0.5px solid #F0F0EC" }}, p.area),
                  React.createElement('td', { style:{ padding:"7px 10px", color:p.inquilino==="—"?"#ccc":"#333", borderRight:"0.5px solid #F0F0EC" }}, p.inquilino),
                  React.createElement('td', { style:{ padding:"7px 10px", fontWeight:500, borderRight:"0.5px solid #F0F0EC" }}, fmt(p.canon)),
                  React.createElement('td', { style:{ padding:"7px 10px", color:"#666", borderRight:"0.5px solid #F0F0EC" }}, p.vence),
                  React.createElement('td', { style:{ padding:"7px 10px", borderRight:"0.5px solid #F0F0EC" }}, React.createElement(Pill, { color:ocupColor[p.ocupacion] }, p.ocupacion)),
                  React.createElement('td', { style:{ padding:"7px 10px" }}, React.createElement(Pill, { color:contratoColor[p.contrato] }, p.contrato))
                ))
              )
            )
          ),
          React.createElement('div', { style:{ padding:"7px 14px", borderTop:"0.5px solid #F0F0EC", fontSize:11, color:"#aaa" }},
            `${filtered.length} inmuebles`
          )
        )
      );
    }

    function Inquilinos() {
      const rows = [
        { ini:"LM", col:"teal",   name:"Laura Monsalve", cc:"37.884.112", inmueble:"Apto 12",    canon:"$1.450.000", hasta:"Dic 2025", pago:"Al día",       pagoCol:"green", ciclo:"Activo",       cicloCol:"green", docs:4, tel:"316 820 4411" },
        { ini:"RG", col:"purple", name:"Ricardo Gómez",  cc:"13.451.223", inmueble:"Local 08",   canon:"$3.200.000", hasta:"Mar 2026", pago:"Al día",       pagoCol:"green", ciclo:"Activo",       cicloCol:"green", docs:6, tel:"311 540 2233" },
        { ini:"MP", col:"amber",  name:"Martha Peña",    cc:"63.902.441", inmueble:"Apto 05",    canon:"$1.450.000", hasta:"Sep 2025", pago:"Parcial",      pagoCol:"amber", ciclo:"Activo",       cicloCol:"green", docs:3, tel:"320 114 9900" },
